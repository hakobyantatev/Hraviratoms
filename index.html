<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Բացահայտողների Միջոցառման Հրավեր</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Armenian:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Armenian', sans-serif;
            overflow: hidden;
            margin: 0;
            background: linear-gradient(180deg, #4da0cc 0%, #a1d7f2 100%);
            height: 100vh;
        }

        /* Արև */
        .sun {
            position: absolute;
            top: 40px;
            right: 60px;
            width: 100px;
            height: 100px;
            background: #facc15;
            border-radius: 50%;
            box-shadow: 0 0 50px #fde047;
            z-index: 1;
        }

        /* Ամպեր */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: moveClouds linear infinite;
        }
        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud1 { width: 100px; height: 40px; top: 10%; animation-duration: 25s; }
        .cloud2 { width: 150px; height: 50px; top: 20%; animation-duration: 40s; left: -200px; }
        .cloud3 { width: 80px; height: 30px; top: 15%; animation-duration: 30s; left: -300px; opacity: 0.5; }

        @keyframes moveClouds {
            from { transform: translateX(-350px); }
            to { transform: translateX(130vw); }
        }

        /* Ճայեր */
        .bird {
            position: absolute;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M496 384c-13.3 0-24-10.7-24-24 0-48.5-39.5-88-88-88s-88 39.5-88 88c0 13.3-10.7 24-24 24s-24-10.7-24-24c0-48.5-39.5-88-88-88s-88 39.5-88 88c0 13.3-10.7 24-24 24S0 370.7 0 357.3C0 273.9 67.9 206 151.3 206c39.6 0 75.7 15.4 102.7 40.5 27-25.1 63.1-40.5 102.7-40.5C444.1 206 512 273.9 512 357.3c0 13.3-10.7 24-24 24z" fill="%23333"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.6;
            animation: flyBirds linear infinite;
        }
        .bird1 { width: 30px; height: 30px; top: 10%; left: 20%; animation-duration: 15s; }
        .bird2 { width: 20px; height: 20px; top: 15%; left: 25%; animation-duration: 18s; animation-delay: 2s; }

        @keyframes flyBirds {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(5vw, -2vh) rotate(5deg); }
            50% { transform: translate(10vw, 0) rotate(0deg); }
            75% { transform: translate(5vw, 2vh) rotate(-5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* Ծով */
        .ocean {
            height: 30%;
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
            background: #0077be;
            z-index: 5;
        }

        .wave {
            background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x;
            position: absolute;
            top: -90px;
            width: 6400px;
            height: 198px;
            animation: wave 7s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
        }

        @keyframes wave {
            0% { margin-left: 0; }
            100% { margin-left: -1600px; }
        }

        /* Կղզի */
        .island {
            position: absolute;
            bottom: 15vh;
            right: -100px;
            width: 500px;
            height: 300px;
            z-index: 4;
            animation: slideIslandIn 2s forwards ease-out;
            animation-delay: 1s;
        }

        @keyframes slideIslandIn {
            to { right: 5vw; }
        }

        .island-land {
            position: absolute;
            bottom: 0;
            left: 50px;
            width: 400px;
            height: 100px;
            background: #e6cc80;
            border-radius: 100px 100px 0 0;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Արմավենիներ */
        .palm {
            position: absolute;
            bottom: 80px;
            width: 150px;
            height: 200px;
        }
        .palm-trunk {
            position: absolute;
            bottom: 0;
            left: 65px;
            width: 20px;
            height: 150px;
            background: #8b5a2b;
            border-radius: 10px 10px 0 0;
            transform: rotate(-5deg);
        }
        .palm-leaves {
            position: absolute;
            top: -20px;
            left: 0;
            width: 150px;
            height: 100px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"><path d="M250 250 C 150 150, 50 200, 50 250 C 50 300, 150 350, 250 250 Z M250 250 C 350 150, 450 200, 450 250 C 450 300, 350 350, 250 250 Z M250 250 C 150 50, 200 50, 250 50 C 300 50, 350 50, 250 250 Z M250 250 C 150 450, 200 450, 250 450 C 300 450, 350 450, 250 250 Z" fill="%232d862d"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
        }
        .palm1 { left: 80px; transform: scale(1.2); }
        .palm2 { left: 220px; transform: scale(1) rotate(10deg); bottom: 70px; }

        /* Նավակ */
        .boat-container {
            position: absolute;
            bottom: 30px;
            left: -650px; 
            width: 600px;
            animation: sailToIsland 12s forwards linear, bobbing 3s ease-in-out infinite;
            z-index: 10;
        }

        .boat-img {
            width: 100%;
            display: block;
        }

       @keyframes sailToIsland {
    0% { 
        left: -650px; 
    }
    100% { 
        /* 100vw-ն էկրանի ամբողջ լայնությունն է, 
           իսկ 500px-ը նավակի լայնությունը, որպեսզի այն չանցնի էկրանից դուրս */
        left: calc(100vw - 500px); 
    }
}

        @keyframes bobbing {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        /* Հրավիրատոմս */
        #invitation-card {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
            width: 85%;
            border: 8px solid #ef4444;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #invitation-card.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .title { color: #1e40af; font-size: 1.8rem; font-weight: bold; margin-bottom: 1.5rem; }
        .details { color: #1f2937; font-size: 1.3rem; line-height: 1.8; }

        .sound-hint {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px;
            border-radius: 10px;
            z-index: 100;
        }
    </style>
</head>
<body onclick="startAudio()">

    <div class="sound-hint">🎶 Սեղմեք էկրանին երաժշտությունը լսելու համար</div>

    <audio id="background-song" loop>
        <source src="Լողա Լողա Մեր Լույս Նավակ (1).mp3" type="audio/mpeg">
    </audio>

    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="bird bird1"></div>
    <div class="bird bird2"></div>

    <div class="island">
        <div class="island-land"></div>
        <div class="palm palm1"><div class="palm-trunk"></div><div class="palm-leaves"></div></div>
        <div class="palm palm2"><div class="palm-trunk"></div><div class="palm-leaves"></div></div>
    </div>

    <div id="invitation-card">
        <p class="title">Հարգելի՛ գործընկերներ,</p>
        <p class="details">
            Սիրով հրավիրում ենք Ձեզ ներկա գտնվելու <b>«Բացահայտողների»</b> միջոցառմանը, որը տեղի կունենա <b>ապրիլի 15-ին, ժամը 13։00-ին</b>:
            <br><br>
            Սիրով սպասում ենք Ձեզ միասին նավարկելու այբուբենի ծովում։
        </p>
    </div>

    <div class="boat-container">
        <img src="nav.png" alt="Նավակ" class="boat-img">
    </div>

    <div class="ocean">
        <div class="wave"></div>
        <div class="wave" style="top: -60px; opacity: 0.6; animation-delay: -3s; animation-duration: 5s;"></div>
    </div>

    <script>
        function startAudio() {
            const audio = document.getElementById('background-song');
            audio.play();
            document.querySelector('.sound-hint').style.display = 'none';
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('invitation-card').classList.add('show');
            }, 11500);
        });
    </script>
</body>
</html>
